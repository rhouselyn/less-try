name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact: Gualingo-Windows
          - os: macos-latest
            platform: macos
            artifact: Gualingo-macOS
          - os: ubuntu-latest
            platform: linux
            artifact: Gualingo-Linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Linux 系统依赖 ──
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev python3-pip libgtk-3-dev libglib2.0-dev libwebkit2gtk-4.1-dev

      # ── 构建前端 ──
      - name: Build Frontend
        shell: bash
        run: |
          cd frontend-soft-ui
          npm install
          npm run build

      # ── 安装 Python 依赖 ──
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pywebview pyinstaller pillow cairosvg

      # ── 生成图标 ──
      - name: Generate icons from SVG
        shell: bash
        run: |
          python3 -c "
          import cairosvg, os
          from PIL import Image
          import io
          os.makedirs('assets', exist_ok=True)
          # PNG 512x512
          png512 = cairosvg.svg2png(url='assets/icon.svg', output_width=512, output_height=512)
          with open('assets/icon.png', 'wb') as f: f.write(png512)
          with open('assets/icon_macos.png', 'wb') as f: f.write(png512)
          # ICO (multi-size)
          sizes = [(256,256),(128,128),(48,48),(32,32),(16,16)]
          imgs = []
          for w,h in sizes:
              p = cairosvg.svg2png(url='assets/icon.svg', output_width=w, output_height=h)
              imgs.append(Image.open(io.BytesIO(p)))
          imgs[0].save('assets/icon.ico', format='ICO', sizes=sizes)
          print('Icons generated!')
          "

      # ── PyInstaller 打包 ──
      - name: Build with PyInstaller
        working-directory: ${{ github.workspace }}
        run: |
          pyinstaller Gualingo.spec --noconfirm

      # ── 打包为压缩文件 ──
      - name: Package artifact (Windows)
        if: matrix.platform == 'windows'
        run: |
          Compress-Archive -Path dist/Gualingo/* -DestinationPath dist/Gualingo-Windows.zip

      - name: Package artifact (macOS/Linux)
        if: matrix.platform != 'windows'
        run: |
          cd dist
          tar -czf Gualingo-${{ matrix.platform }}.tar.gz -C Gualingo .

      # ── 上传构建产物 ──
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/Gualingo-Windows.zip
            dist/Gualingo-macos.tar.gz
            dist/Gualingo-Linux.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          generate_release_notes: true
